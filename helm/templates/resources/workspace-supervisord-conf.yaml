{{- $names := list "provision" "workspace" "command" "publish" "cleanup" -}}
{{- $ns := include "groundx.ns" . -}}
{{- range $idx, $worker := $names }}
{{- $create := include (printf "groundx.workspace.%s.create" $worker) $ -}}
{{- if eq $create "true" }}
{{- $svcData := include (printf "groundx.workspace.%s.settings" $worker) $ | fromYaml -}}
{{- $name := get $svcData "name" -}}
{{- $queue := get $svcData "queue" -}}
{{- $threads := get $svcData "threads" -}}
{{- $workers := int (get $svcData "workers") -}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}-supervisord-conf-map
  namespace: {{ $ns }}
  labels:
{{ include "groundx.renderDefaultLabels" (dict "name" "" "indent" 4 "root" $) }}
data:
  supervisord.conf: |
    [supervisord]
    nodaemon=true
    logfile=/dev/null
    {{ printf "" }}

    {{- range $i, $_ := until $workers }}
    [program:celery_worker_{{ add $i 1 }}]
    command=celery -A celery_app.app worker -n %(ENV_POD_NAME)s-w{{ add $i 1 }} --loglevel={{ include "groundx.logLevel" $ | upper }} --concurrency={{ $threads }} --queues={{ $queue }}{{ include "groundx.celery.options" $ }} --prefetch-multiplier=1 --max-tasks-per-child=100
    environment=
      CELERY_WORKER_NAME="%(ENV_POD_NAME)s-w{{ add $i 1 }}",
      LOCAL="0",
      PYTHONUNBUFFERED="1"{{ include "groundx.celery.env" $ }}
    autostart=true
    autorestart=true
    stdout_logfile=/dev/stdout
    stdout_logfile_maxbytes=0
    stderr_logfile=/dev/stderr
    stderr_logfile_maxbytes=0
{{ end }}
{{- end }}
{{- end }}
