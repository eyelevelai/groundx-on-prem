context: |
  - IDENTITY: groundx-on-prem. Role: infra. Language: Helm (+ Bash operator CLI + legacy Terraform). Chart version: 0.2.5. Privileged: true (Tier 3 explicit authorization required for any destructive/deploy/publish operation).
  - PURPOSE: Packages the commercial GroundX RAG platform (document ingestion + hybrid text/vector search + re-ranking + LLM summarization) as a Kubernetes deployment for self-hosted/air-gapped environments. Deploys pre-built private container images; no app source code lives here.
  - K8S TARGETS: eks, aks, gke, openshift, minikube (selected via cluster.type values key).
  - BACKING SERVICES DEPLOYED (each can be swapped via existing:{} + serviceType): Redis (cache), MySQL/Percona XtraDB (db), MinIO/S3 (file), OpenSearch (search), Kafka/Strimzi or SQS (stream). Optional: Neo4j (legacy only, absent from current Helm path), Prometheus/Grafana (monitoring).
  - APP RUNTIMES DEPLOYED: Python (Gunicorn + Celery + supervisord), Go, GPU inference (vLLM). Not authored here — shipped as pre-built private images (public.ecr.aws/c9r4x6y5 default; overridable via admin.imageRepository).
  
  - AGENT BOUNDARY — READ THIS BEFORE ANY EDIT:
    - src/groundx/ is the SOURCE OF TRUTH. All Helm chart changes go here.
    - helm/ is a MANUAL MIRROR of src/groundx/ with tests/ removed and Chart.yaml reformatted. DO NOT HAND-EDIT helm/. There is NO in-repo regen script and NO drift check between helm/ and src/. Any change to src/ must be manually synced to helm/. This is a latent drift risk and a prime early-win cleanup target.
    - helm-releases/*.tgz are build outputs of src/build.sh (helm package). Never edit.
    - src/groundx/tests/__snapshot__/*.snap are generated golden files from helm-unittest. Never hand-edit; regenerate with: helm unittest -u src/groundx. CI (helm-tests.yml) enforces snapshot match — this is the ONLY check that guards template changes.
    - terraform/**/.terraform.lock.hcl are generated lockfiles.
  
  - PRIVILEGED CAPABILITIES (require explicit human authorization before any execution):
    - bin/operator: deploys AND DESTROYS (-c clear mode) Helm releases and Terraform stacks for any component, including stateful data stores (db/file/search) — can DELETE stateful infrastructure.
    - bin/environment: creates/destroys AWS VPCs and EKS clusters via terraform apply --auto-approve / terraform destroy (bin/shared/util:deploy()). Full cloud teardown with no confirmation gate.
    - src/build.sh: runs aws s3 cp to s3://eyelevel-upload/helm/ — publish rights to the PUBLIC Helm chart bucket (registry.groundx.ai/helm).
    - Charts request GPU resources, PersistentVolumes, LoadBalancer Services/Ingress (ALB, OpenShift Routes), RBAC (rbac.authorization.k8s.io, apiregistration.k8s.io), and a custom APIService/metrics server.
    - Init containers run arbitrary wget|tar from upload.groundx.ai — supply-chain surface for GPU model weights.
  
  - DEPLOYMENT CONTRACT (values surface):
    - Primary contract: src/groundx/values.schema.json (1693 lines, additionalProperties:false on most blocks — STRICT). This is the spec-level contract; changes here have broad blast radius.
    - Top-level keys: global, licenseKey, namespace, imageType, languages, logLevel, mode, admin, cluster, serviceAccount, engines, busybox, cache, db, file, search, stream, summary, groundx, layout, layoutWebhook, metrics, preProcess, process, queue, ranker, summaryClient, upload, dashboard, extract, integration, throughput.
    - mode: all (default) or ingest (ingest-only deployment). imageType: chainguard switches to hardened images (UID 65532 vs 1001).
    - Template guard: helm-unittest snapshot tests (src/groundx/tests/__snapshot__/*.snap) indirectly validate rendered K8s objects. CI enforces snapshot match.
    - UNSCHEMATIZED CONTRACT: extract-config-py.yaml generates Python that does from groundx.extract import (AgentSettings, ContainerSettings, ContainerUploadSettings, GroundXSettings). This binds to constructors in the eyelevel/extract container image. The field names are the contract; they live in the image, not here. Renaming a field in the image silently breaks rendering — nothing validates this binding.
  
  - EXTERNAL INTEGRATIONS:
    - registry.groundx.ai/helm: Helm chart registry (hardcoded default). Public.
    - public.ecr.aws/c9r4x6y5: all GroundX container images (default, overridable via admin.imageRepository).
    - upload.groundx.ai: GPU model weights downloaded at pod startup by inference init-containers (wget|tar). HARDCODED — AIR-GAP BLOCKER. Must be mirrored for offline installs. No validation.
    - api.groundx.ai (extract.callbackUrl): RAG/ingest callback for the extract subsystem. DEFAULTS to in-cluster groundx /api — only leaves cluster when user explicitly sets api.groundx.ai. OPT-IN; air-gap-safe by default. The ONLY edge that can phone home to hosted GroundX.
    - OpenAI / Azure OpenAI: optional external LLM for extract.agent (off by default; default is in-cluster vLLM).
    - Google Sheets / Drive: optional extract.save sink (requires GCP service-account JSON secret, gcpCredentials key).
    - AWS S3 / SQS / RDS / ElastiCache: configurable swap-outs for file/stream/db/cache backing services.
    - Install-time Helm repos: nvidia (ngc), percona, minio, strimzi (quay), opensearch, prometheus-community, neo4j.
  
  - CROSS-REPO COUPLING: NO in-tree code dependency on any other workspace repo (verified). Soft reference-only edges:
    - groundx-python: referenced in README examples; plus a soft code-binding via generated extract-config-py.yaml (see UNSCHEMATIZED CONTRACT above). Dependency-graph edge: reference-only, outbound, unschematized.
    - groundx-workspace-runner: NOT present in this chart at all. No workspace runner Helm subsystem exists here.
    - No edges to cashbot-go, groundx-studio-harness, ai-server, eyelevel-fern-config, or any frontend repo.
  
  - QUALITY GATES:
    - helm unittest src/groundx (snapshot tests — the CI gate, enforced in helm-tests.yml)
    - helm template src/groundx -f values/minikube/values.yaml (render check)
    - helm lint (declared in repos.yml run.lint)
    - NO drift check between helm/ and src/groundx/ — gap.
  
  - COMMIT CONVENTION: standard conventional commits (inferred; no explicit convention in-repo).
  
  - KNOWN GAPS / OPEN QUESTIONS:
    - helm/ <-> src/groundx duplication: no regen script, no drift check — manual sync, latent drift.
    - upload.groundx.ai model-weight download hardcoded in init-containers — air-gap blocker; no documented pre-seeding mechanism.
    - licenseKey phone-home behavior unknown (validation logic lives in opaque container images).
    - Neo4j (graph) service wired in legacy bin/terraform but absent from current chart — likely legacy-only, unconfirmed.
    - extract subsystem groundx.extract constructor signatures live in the image, not this repo — silent breaking changes possible.
    - Plaintext secret defaults in example values (OpenSearch password, minio123) — footgun if copied to prod.

rules:
  proposal:
    - State the blast radius up front — which environments/clusters redeploy and what could
      break on rollout; include a rollback/rollforward plan
    - List affected environments (dev/staging/prod) and any data/stateful resource impact
    - If open design questions remain after consulting AGENTS.md and existing specs, use the
      superpowers:brainstorming skill; otherwise note "none" in proposal.md
  specs:
    - Use the superpowers:test-driven-development skill to frame validation as Given/When/Then
      where a check exists (e.g. "Given the chart, When `helm lint` runs, Then no errors")
    - Specify the change precisely (chart values, templates, resource limits/requests, probes)
      and what validates it (helm lint / helm template diff / kubeconform)
  design:
    - Document the rollout strategy (ordering, zero-downtime, migrations of stateful resources)
      and the blast radius across environments
    - When a decision warrants an ADR, use the architectural-decision-records skill and write
      it to docs/adr/<LINEAR-TICKET>-<kebab>.md (Linear ticket prefix mandatory). Reference
      the ADR filename inline in design.md.
  tasks:
    - Implementation runs through the ambient Superpowers loop — list only artifact-specific work
    - Gate the change on the repo's validator (helm lint / helm template render / diff)
    - Sequence the rollout (canary/stage → prod) and note any manual ops or secret changes
