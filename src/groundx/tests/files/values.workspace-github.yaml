cluster:
  pvClass: azure-files-rwx
  pvAccessMode: ReadWriteMany

workspace:
  enabled: true
  token: test-runner-token
  publishDryRun: false
  github:
    apiBaseUrl: https://github.enterprise.example/api/v3
    appId: "12345"
    installationId: "67890"
    privateKeySecret:
      name: workspace-github-app
      key: private-key.pem
    tokenTtlSeconds: 1800
